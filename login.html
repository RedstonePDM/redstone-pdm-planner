<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redstone PDM – Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: white; border-radius: 12px; padding: 48px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.logo { text-align: center; margin-bottom: 32px; }
.logo h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
.logo p { font-size: 13px; color: #888; margin-top: 4px; }
.logo .dot { color: #e63946; }
label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
input[type=password] { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; }
input[type=password]:focus { border-color: #1a1a2e; }
button { width: 100%; padding: 13px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
button:hover { background: #16213e; }
.error { background: #fff0f0; color: #e63946; border: 1px solid #ffc0c0; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Redstone<span class="dot">.</span>PDM</h1>
    <p>Operations Platform</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" autofocus>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
